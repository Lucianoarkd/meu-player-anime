<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player de Anime</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 800px; margin-top: 20px; }
        .playlist { margin-top: 20px; width: 100%; }
        .item { padding: 15px; background: #333; margin-bottom: 5px; cursor: pointer; border-radius: 5px; }
        .item:hover { background: #444; }
    </style>
</head>
<body>

    <h2>Minha Biblioteca Pessoal</h2>

    <div class="container">
        <video id="player" playsinline controls>
            <source src="" type="video/mp4" />
        </video>

        <div class="playlist" id="playlist">
            <div class="item" onclick="playVideo('LINK_DO_VIDEO_1.mp4')">Episódio 01 - O Início</div>
            <div class="item" onclick="playVideo('LINK_DO_VIDEO_2.mp4')">Episódio 02 - O Desafio</div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player');
        function playVideo(url) {
            const video = document.querySelector('video');
            video.src = url;
            player.play();
        }
    </script>
</body>
</html>
